<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generátor skladových lokací</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    margin:20px;
    background:#f5f5f5;
}

.controls{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:220px;
    font-size:16px;
    padding:10px;
}

button{
    padding:10px 20px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
}

.page{
    width:210mm;
    min-height:297mm;
    background:white;
    margin:auto;
    padding:15mm;
    page-break-after:always;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px 30px;
}

.label{
    text-align:center;
    break-inside:avoid;
    page-break-inside:avoid;
}

.label svg{
    width:100%;
    height:70px;
}

.location{
    font-size:20px;
    font-weight:bold;
}

@media print{

    body{
        background:white;
        margin:0;
    }

    .controls{
        display:none;
    }

    .page{
        margin:0;
        box-shadow:none;
    }
}

</style>
</head>

<body>

<div class="controls">

<h2>Generátor skladových lokací</h2>

<p>Jedna lokace na řádek:</p>

<textarea id="locations"></textarea>

<br>

<button onclick="generate()">
Generovat
</button>

<button onclick="exportPDF()">
Export PDF
</button>

<button onclick="window.print()">
Tisk
</button>

<button onclick="clearAll()">
Vymazat
</button>

</div>

<div id="pages"></div>

<script>

const STORAGE_KEY = "warehouse_locations";

const defaultData = `112B
112K
112M
112R
112X
PAT0
PAT1
PAT2
PAT3
FEMO
CHLD
HARD
STAN`;

function loadSaved(){

    const saved = localStorage.getItem(STORAGE_KEY);

    document.getElementById("locations").value =
        saved || defaultData;
}

function saveData(){

    localStorage.setItem(
        STORAGE_KEY,
        document.getElementById("locations").value
    );
}

function clearAll(){

    if(confirm("Opravdu vymazat seznam?")){

        localStorage.removeItem(STORAGE_KEY);

        document.getElementById("locations").value = "";

        generate();
    }
}

function generate(){

    saveData();

    const pagesDiv =
        document.getElementById("pages");

    pagesDiv.innerHTML = "";

    const items =
        document.getElementById("locations")
        .value
        .split("\n")
        .map(x => x.trim())
        .filter(x => x);

    const labelsPerPage = 20;

    for(let pageStart=0;
        pageStart<items.length;
        pageStart+=labelsPerPage){

        const page =
            document.createElement("div");

        page.className = "page";

        const grid =
            document.createElement("div");

        grid.className = "grid";

        page.appendChild(grid);

        pagesDiv.appendChild(page);

        const pageItems =
            items.slice(
                pageStart,
                pageStart + labelsPerPage
            );

        pageItems.forEach((loc,index)=>{

            const label =
                document.createElement("div");

            label.className = "label";

            const svg =
                document.createElementNS(
                    "http://www.w3.org/2000/svg",
                    "svg"
                );

            svg.id =
                "barcode_" +
                pageStart +
                "_" +
                index;

            label.appendChild(svg);

            grid.appendChild(label);

            JsBarcode(svg, loc, {
                format:"CODE128",
                displayValue:true,
                text:loc,
                fontSize:20,
                height:55,
                width:2,
                margin:5
            });

        });

    }
}

function exportPDF(){

    const element =
        document.getElementById("pages");

    html2pdf()
    .set({
        margin:0,
        filename:"Skladove_lokace.pdf",
        image:{
            type:"jpeg",
            quality:1
        },
        html2canvas:{
            scale:3,
            useCORS:true
        },
        jsPDF:{
            unit:"mm",
            format:"a4",
            orientation:"portrait"
        },
        pagebreak:{
            mode:["css","legacy"]
        }
    })
    .from(element)
    .save();
}

loadSaved();
generate();

document
.getElementById("locations")
.addEventListener(
    "input",
    saveData
);

</script>

</body>
</html>
